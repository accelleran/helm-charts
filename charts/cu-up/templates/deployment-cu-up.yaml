{{- include
      "accelleran.common.deployment"
      (fromYaml (include "accelleran.cu-up.deployment.args" .))
-}}


{{- define "accelleran.cu-up.deployment.args" -}}
{{- $ := . -}}
{{- $values := (index $.Values "cu-up") -}}

top:
  {{ $ | toYaml | nindent 2 }}
values:
  {{ $values | toYaml | nindent 2 }}

initContainers:
- {{ fromYaml (include "accelleran.common.init.nats" (fromYaml (include "accelleran.cu-up.init.args" .))) | toYaml | nindent 2 }}

top:
  {{ $ | toYaml | nindent 2 }}
values:
  {{ $values | toYaml | nindent 2 }}

env:
  - name: __APPNAME
    value: cuUp
{{- with (include "accelleran.common.bootstrap.instanceId" (dict "top" $)) }}
  - name: INSTANCE_FILTER
    value: {{ . | quote }}
{{- end }}
  - name: LICENSE_PATH
    value: {{ include "accelleran.common.drax.license.mountPath" (dict "top" $ "values" $values) | quote }}
envFrom:
  - configMapRef:
      name: {{ include "accelleran.common.bootstrap.configMapName" (dict "top" $) | quote }}
{{- end -}}
