nameOverride: ""
fullnameOverride: ""

image:
  repository: nginx
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

  pullPolicy: IfNotPresent

  pullSecrets: []


extraEnvVars: []

replicaCount: 1

resolver: ""
dnsService: "kube-dns"
dnsNamespace: "kube-system"
clusterDomain: cluster.local

auth:
  enabled: false
  preventSecretUninstall: true
  users: []
    # - username: "user"
    #   password: "pass"
    #   organization: "org"

startupProbe:
  enabled: false
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 15
  successThreshold: 1

livenessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
    ephemeral-storage: 50Mi
  limits:
    cpu: 150m
    memory: 192Mi
    ephemeral-storage: 2Gi

podSecurityContext:
  enabled: true
  fsGroupChangePolicy: Always
  sysctls: []
  supplementalGroups: []
  fsGroup: 1001

containerSecurityContext:
  enabled: true
  seLinuxOptions: {}
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  privileged: false
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: "RuntimeDefault"

podLabels: {}
podAnnotations: {}

affinity: {}
tolerations: []
nodeSelector: {}

extraVolumes: []
extraVolumeMounts: []

pdb:
  create: true
  minAvailable: ""
  maxUnavailable: ""

service:
  name: ""
  annotations: {}
  type: ClusterIP
  port: 80
  nodePort: 0
  loadBalancerIP: ""
  externalTrafficPolicy: Cluster

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
